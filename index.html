<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca virtual</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <main>

        <section class="card-register">
            <header class="header-card">
                <h2>Adicione um livro</h2>
            </header>

            <hr>

            <form class="form-item" id="formItem">
                <label for="">Nome</label>
                <input type="text" id="bookTitle" placeholder="Harry Potter" required>

                <label for="">Autor</label>
                <input type="text" id="authorName" placeholder="J.K. Rowling" required>

                <button type="submit">Adicionar</button>
            </form>
        </section>

        <section class="list-books">
            <header class="header-card">
                <h2>Seus livros</h2>
            </header>

            <hr>

            <section class="empty-state hidden" id="empty-state">
                <p>Você ainda não registrou nenhum livro...</p>
            </section>

            <section class="list" >
                <ul id="list">
                </ul>
            </section>

        </section>

    </main>

</body>

<script type="module" src="main.js" defer></script>
<script type="module" src="functions.js" defer></script>

</html>
